# PaperPilot 配置文件
# 所有敏感信息通过环境变量覆盖，不要硬编码

# DeepSeek API（仅用于 Phase 2 的 Chat 论文分析，不做 Embedding）
deepseek:
  api_key: ${DEEPSEEK_API_KEY}

# Google Gemini Embedding（在线模式的免费替代，1500 req/min）
gemini:
  api_key: ${GEMINI_API_KEY}

embedding:
  mode: offline              # offline（默认本地多语言模型）| online（Gemini API）
  local_model: paraphrase-multilingual-MiniLM-L12-v2
  cache_dir: ./cache/embedding

data_sources:
  arxiv: true
  openalex: true
  local_pdf: true

search:
  max_results_per_source: 30
  default_top_k: 20

cache:
  dir: ./cache/api
  ttl_hours: 24

ui:
  window_width: 1100
  window_height: 750
  title: PaperPilot
