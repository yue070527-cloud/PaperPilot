# PaperPilot 配置文件
# 所有敏感信息通过环境变量覆盖，不要硬编码

deepseek:
  api_key: ${DEEPSEEK_API_KEY}
  embedding_model: deepseek-embedding

embedding:
  mode: online              # online | offline | auto（auto: 在线优先，断网自动切离线）
  cache_dir: ./cache/embedding

data_sources:
  arxiv: true
  openalex: true
  local_pdf: true

search:
  max_results_per_source: 30
  default_top_k: 20

cache:
  dir: ./cache/api
  ttl_hours: 24

ui:
  window_width: 1100
  window_height: 750
  title: PaperPilot
